<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Manager - Eka Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 2rem;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }

        .table {
            color: #eee;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="d-flex align-items-center mb-4">
            <a href="/" class="btn btn-outline-light me-3"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <h2 class="mb-0"><i class="fa-solid fa-list-check me-2"></i>App Manager</h2>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card glass-panel bg-transparent">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle text-white" id="appsTable">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Network</th>
                                        <th>Ports (Container -> Host)</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="appsList">
                                    <tr>
                                        <td colspan="5" class="text-center">Loading apps...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content glass-panel text-white bg-dark">
                <div class="modal-header border-bottom border-secondary">
                    <h5 class="modal-title">App Configuration: <span id="modalAppName"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        Changing settings will recreate the container. Minimal downtime expected.
                    </div>

                    <form id="configForm">
                        <input type="hidden" id="editAppId">

                        <div class="mb-3">
                            <label class="form-label">Network Mode</label>
                            <select class="form-select bg-secondary text-white border-0" id="editNetworkMode">
                                <option value="bridge">Bridge (Default)</option>
                                <option value="host">Host</option>
                            </select>
                            <div class="form-text text-light opacity-50">Host mode shares network namespace with host.
                                Port mapping is disabled in Host mode.</div>
                        </div>

                        <div id="portsSection">
                            <label class="form-label d-flex justify-content-between">
                                Port Mappings
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="addPortRow()">
                                    <i class="fa-solid fa-plus"></i> Add Port
                                </button>
                            </label>
                            <div id="portsContainer">
                                <!-- Rows injected by JS -->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveConfig()">Save & Restart</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentApps = [];

        function loadApps() {
            $.get('/api/docker/containers', function (data) {
                const tbody = $('#appsList');
                tbody.empty();

                data.forEach(app => {
                    // Get Image Name safely
                    let imageName = app.image || 'Unknown';
                    if (typeof app.image === 'object' && app.image.tags) {
                        imageName = app.image.tags[0];
                    }

                    const row = `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="fa-solid fa-cube fa-2x"></i>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">${app.name}</h6>
                                <small class="text-white-50">${imageName}</small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge bg-${app.status === 'running' ? 'success' : 'danger'}">
                            ${app.status.toUpperCase()}
                        </span>
                    </td>
                    <td>
                       <span id="net-${app.id}" class="badge bg-secondary">...</span>
                    </td>
                    <td>
                        <small id="ports-${app.id}">Loading...</small>
                    </td>
                    <td>
                        <div class="btn-group">
                            ${app.status === 'running' ?
                            `<button class="btn btn-sm btn-warning" onclick="doAction('${app.id}', 'restart')" title="Restart"><i class="fa-solid fa-rotate-right"></i></button>
                                 <button class="btn btn-sm btn-danger" onclick="doAction('${app.id}', 'stop')" title="Stop"><i class="fa-solid fa-stop"></i></button>` :
                            `<button class="btn btn-sm btn-success" onclick="doAction('${app.id}', 'start')" title="Start"><i class="fa-solid fa-play"></i></button>`
                        }
                            <button class="btn btn-sm btn-info" onclick="openSettings('${app.id}')" title="Settings"><i class="fa-solid fa-gear"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="doAction('${app.id}', 'uninstall')" title="Uninstall"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
                    tbody.append(row);

                    // Lazy load details
                    fetchDetails(app.id);
                });
            });
        }

        function fetchDetails(appId) {
            $.get(`/api/apps/details/${appId}`, function (details) {
                $(`#net-${appId}`).text(details.network_mode);

                let portsHtml = '';
                if (details.network_mode === 'host') {
                    portsHtml = '<span class="text-white-50">Host Network (All ports open)</span>';
                } else {
                    details.ports.forEach(p => {
                        portsHtml += `<div>${p.container}/${p.protocol} &rarr; ${p.host}</div>`;
                    });
                }
                $(`#ports-${appId}`).html(portsHtml || '<span class="text-white-50">No ports exposed</span>');
            });
        }

        function doAction(appId, action) {
            if (!confirm(`Are you sure you want to ${action} ${appId}?`)) return;

            $.ajax({
                url: '/api/apps/action',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ id: appId, action: action }),
                success: function () {
                    // alert(`Action ${action} completed`);
                    setTimeout(loadApps, 1000);
                },
                error: function (err) {
                    alert('Error: ' + (err.responseJSON?.error || 'Unknown error'));
                }
            });
        }

        function openSettings(appId) {
            $('#editAppId').val(appId);
            $('#modalAppName').text(appId);

            // Fetch fresh details
            $.get(`/api/apps/details/${appId}`, function (details) {
                $('#editNetworkMode').val(details.network_mode);
                handleNetworkChange(); // update UI visibility

                $('#portsContainer').empty();
                details.ports.forEach(p => {
                    addPortRow(p.container, p.host, p.protocol);
                });

                new bootstrap.Modal('#settingsModal').show();
            });
        }

        function handleNetworkChange() {
            const mode = $('#editNetworkMode').val();
            if (mode === 'host') {
                $('#portsSection').hide();
            } else {
                $('#portsSection').show();
            }
        }

        $('#editNetworkMode').change(handleNetworkChange);

        function addPortRow(container = '', host = '', protocol = 'tcp') {
            const row = `
        <div class="input-group mb-2 port-row">
            <span class="input-group-text bg-secondary text-white border-0">Cont</span>
            <input type="number" class="form-control bg-dark text-white border-secondary p-container" placeholder="80" value="${container}">
            <span class="input-group-text bg-secondary text-white border-0">Host</span>
            <input type="number" class="form-control bg-dark text-white border-secondary p-host" placeholder="8080" value="${host}">
            <select class="form-select bg-secondary text-white border-0 p-proto" style="max-width: 100px;">
                <option value="tcp" ${protocol === 'tcp' ? 'selected' : ''}>TCP</option>
                <option value="udp" ${protocol === 'udp' ? 'selected' : ''}>UDP</option>
            </select>
            <button class="btn btn-outline-danger" onclick="$(this).closest('.port-row').remove()"><i class="fa-solid fa-minus"></i></button>
        </div>
    `;
            $('#portsContainer').append(row);
        }

        function saveConfig() {
            const appId = $('#editAppId').val();
            const networkMode = $('#editNetworkMode').val();
            const ports = [];

            if (networkMode !== 'host') {
                $('.port-row').each(function () {
                    const container = $(this).find('.p-container').val();
                    const host = $(this).find('.p-host').val();
                    const proto = $(this).find('.p-proto').val();
                    if (container && host) {
                        ports.push({ container: container, host: host, protocol: proto });
                    }
                });
            }

            const btn = $('#settingsModal .btn-primary');
            const originalText = btn.text();
            btn.text('Updating...').prop('disabled', true);

            $.ajax({
                url: '/api/apps/update',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    id: appId,
                    network_mode: networkMode,
                    ports: ports
                }),
                success: function () {
                    bootstrap.Modal.getInstance('#settingsModal').hide();
                    // alert('Configuration updated. App is restarting...');
                    setTimeout(loadApps, 3000); // Wait for restart
                },
                error: function (err) {
                    alert('Update Failed: ' + (err.responseJSON?.error || 'Unknown error'));
                },
                complete: function () {
                    btn.text(originalText).prop('disabled', false);
                }
            });
        }

        $(document).ready(loadApps);
    </script>

</body>

</html>
