<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berbagi File - Eka Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
    <script>
        window.userRole = "{{ session.get('role', 'readonly') }}";
    </script>
    <style>
        .sharing-container {
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sharing-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn.primary {
            background: #238636;
            border-color: #238636;
        }

        .btn.primary:hover {
            background: #2ea043;
        }

        .btn.danger {
            background: #da3633;
            border-color: #da3633;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-banner {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-banner.running {
            background: rgba(63, 185, 80, 0.15);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .status-banner.stopped {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .status-banner.not-installed {
            background: rgba(139, 148, 158, 0.15);
            border: 1px solid rgba(139, 148, 158, 0.3);
        }

        .status-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .status-banner.running .status-icon {
            background: rgba(63, 185, 80, 0.2);
            color: #3fb950;
        }

        .status-banner.stopped .status-icon {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
        }

        .status-banner.not-installed .status-icon {
            background: rgba(139, 148, 158, 0.2);
            color: #8b949e;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 500px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .card-header i {
            font-size: 1.2rem;
            color: #58a6ff;
        }

        .card-header h3 {
            font-weight: 500;
            font-size: 1rem;
        }

        .card-body {
            padding: 1rem;
        }

        .card-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .share-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .share-item {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .share-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .share-icon {
            width: 40px;
            height: 40px;
            background: rgba(88, 166, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #58a6ff;
        }

        .share-info {
            flex: 1;
        }

        .share-name {
            font-weight: 500;
        }

        .share-path {
            font-size: 0.8rem;
            color: #8b949e;
            font-family: monospace;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #8b949e;
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .msg {
            padding: 0.8rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .msg.success {
            display: block;
            background: rgba(63, 185, 80, 0.15);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: #3fb950;
        }

        .msg.error {
            display: block;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: #f85149;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #8b949e;
        }

        .access-info {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .access-info h4 {
            margin-bottom: 0.5rem;
            color: #58a6ff;
        }

        .access-info code {
            display: block;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="wallpaper"></div>

    <div class="app-container sharing-container">
        <!-- Header -->
        <div class="sharing-header">
            <button class="btn" onclick="window.location.href='/dashboard'"><i class="fa-solid fa-home"></i></button>
            <h2 style="margin:0; font-weight:400; font-size:1.2rem">
                <i class="fa-solid fa-share-nodes" style="color:#58a6ff"></i> Berbagi File (SMB/Samba)
            </h2>
            <div style="margin-left:auto; display:flex; gap:0.5rem">
                <button class="btn" onclick="loadStatus()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
            </div>
        </div>

        <div id="msg-box" class="msg"></div>

        <!-- Status Banner -->
        <div class="status-banner not-installed" id="status-banner">
            <div class="status-icon">
                <i class="fa-solid fa-circle-question"></i>
            </div>
            <div style="flex:1">
                <div style="font-weight:600" id="status-title">Memeriksa status...</div>
                <div style="font-size:0.85rem; color:#8b949e" id="status-desc">Mohon tunggu</div>
            </div>
            <div id="status-actions"></div>
        </div>

        <div class="cards-grid">
            <!-- Add New Share -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-folder-plus" style="color:#3fb950"></i>
                    <h3>Tambah Share Baru</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Nama Share</label>
                        <input type="text" id="share-name" placeholder="Contoh: Documents">
                    </div>
                    <div class="form-group">
                        <label>Path Folder</label>
                        <input type="text" id="share-path" placeholder="/home/user/shared">
                    </div>
                    <div class="form-group">
                        <label>Deskripsi (opsional)</label>
                        <input type="text" id="share-desc" placeholder="Folder dokumen bersama">
                    </div>
                    <label class="checkbox-item">
                        <input type="checkbox" id="share-public" checked>
                        <span>Akses publik (tanpa password)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="share-writable" checked>
                        <span>Bisa tulis (read-write)</span>
                    </label>
                </div>
                <div class="card-footer">
                    <button class="btn primary" onclick="addShare()" id="btn-add" {% if session.get('role') not in
                        ['owner', 'admin' ] %}disabled{% endif %}>
                        <i class="fa-solid fa-plus"></i> Tambah Share
                    </button>
                </div>
            </div>

            <!-- Share List -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-folder-tree"></i>
                    <h3>Daftar Share Aktif</h3>
                </div>
                <div class="card-body">
                    <div class="share-list" id="share-list">
                        <div class="empty-state">
                            <i class="fa-solid fa-spinner fa-spin"></i>
                            <div>Memuat...</div>
                        </div>
                    </div>

                    <div class="access-info" id="access-info" style="display:none">
                        <h4><i class="fa-solid fa-laptop"></i> Cara Akses dari Windows:</h4>
                        <code id="access-path">\\server-ip\sharename</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let serverIP = '';

        document.addEventListener('DOMContentLoaded', () => {
            loadStatus();
        });

        function showMsg(msg, type) {
            const el = document.getElementById('msg-box');
            el.textContent = msg;
            el.className = 'msg ' + type;
            setTimeout(() => { el.className = 'msg'; }, 5000);
        }

        function loadStatus() {
            fetch('/api/smb/status')
                .then(r => r.json())
                .then(data => {
                    serverIP = data.server_ip || 'server-ip';
                    updateStatusBanner(data);
                    loadShares();
                })
                .catch(err => {
                    updateStatusBanner({ installed: false });
                });
        }

        function updateStatusBanner(data) {
            const banner = document.getElementById('status-banner');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');
            const actions = document.getElementById('status-actions');
            const canManage = ['owner', 'admin'].includes(window.userRole);

            if (!data.installed) {
                banner.className = 'status-banner not-installed';
                banner.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
                title.textContent = 'Samba Belum Terinstall';
                desc.innerHTML = `
                    <div>Install Samba secara manual di server host dengan perintah:</div>
                    <code style="display:block; background:rgba(0,0,0,0.3); padding:0.5rem; border-radius:4px; margin-top:0.5rem; font-size:0.85rem">
                        sudo apt-get update && sudo apt-get install -y samba
                    </code>
                    <div style="margin-top:0.5rem; font-size:0.8rem">Setelah diinstall, refresh halaman ini.</div>
                `;
                actions.innerHTML = '';
            } else if (data.running) {
                banner.className = 'status-banner running';
                banner.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                title.textContent = 'Samba Berjalan';
                desc.textContent = 'File sharing aktif dan siap digunakan';
                actions.innerHTML = canManage ? '<button class="btn danger" onclick="controlSamba(\'stop\')"><i class="fa-solid fa-stop"></i> Stop</button>' : '';

                // Show access info
                document.getElementById('access-info').style.display = 'block';
                document.getElementById('access-path').textContent = `\\\\${serverIP}\\sharename`;
            } else {
                banner.className = 'status-banner stopped';
                banner.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-circle-pause"></i>';
                title.textContent = 'Samba Tidak Aktif';
                desc.textContent = 'Service Samba dihentikan';
                actions.innerHTML = canManage ? '<button class="btn primary" onclick="controlSamba(\'start\')"><i class="fa-solid fa-play"></i> Start</button>' : '';
            }
        }

        function loadShares() {
            fetch('/api/smb/shares')
                .then(r => r.json())
                .then(data => {
                    renderShares(data.shares || []);
                })
                .catch(err => {
                    document.getElementById('share-list').innerHTML = '<div class="empty-state">Gagal memuat daftar share</div>';
                });
        }

        function renderShares(shares) {
            const container = document.getElementById('share-list');
            const canManage = ['owner', 'admin'].includes(window.userRole);

            if (shares.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open" style="font-size:2rem; opacity:0.5"></i>
                        <div style="margin-top:0.5rem">Belum ada folder yang di-share</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = shares.map(s => `
                <div class="share-item">
                    <div class="share-icon">
                        <i class="fa-solid fa-folder"></i>
                    </div>
                    <div class="share-info">
                        <div class="share-name">${s.name}</div>
                        <div class="share-path">${s.path}</div>
                    </div>
                    ${canManage ? `
                        <button class="btn danger" onclick="removeShare('${s.name}')" style="padding:0.3rem 0.6rem">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }

        function addShare() {
            const name = document.getElementById('share-name').value.trim();
            const path = document.getElementById('share-path').value.trim();
            const desc = document.getElementById('share-desc').value.trim();
            const isPublic = document.getElementById('share-public').checked;
            const writable = document.getElementById('share-writable').checked;

            if (!name || !path) {
                showMsg('Nama dan path share harus diisi', 'error');
                return;
            }

            const btn = document.getElementById('btn-add');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menambahkan...';

            fetch('/api/smb/share/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, path, description: desc, public: isPublic, writable })
            })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-plus"></i> Tambah Share';

                    if (data.error) {
                        showMsg(data.error, 'error');
                    } else {
                        showMsg('Share berhasil ditambahkan!', 'success');
                        document.getElementById('share-name').value = '';
                        document.getElementById('share-path').value = '';
                        document.getElementById('share-desc').value = '';
                        loadShares();
                    }
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-plus"></i> Tambah Share';
                    showMsg('Gagal menambahkan share', 'error');
                });
        }

        function removeShare(name) {
            if (!confirm(`Yakin ingin menghapus share "${name}"?`)) return;

            fetch('/api/smb/share/remove', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        showMsg(data.error, 'error');
                    } else {
                        showMsg('Share berhasil dihapus', 'success');
                        loadShares();
                    }
                })
                .catch(err => showMsg('Gagal menghapus share', 'error'));
        }

        function controlSamba(action) {
            fetch('/api/smb/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        showMsg(data.error, 'error');
                    } else {
                        showMsg(`Samba berhasil di-${action}`, 'success');
                        loadStatus();
                    }
                })
                .catch(err => showMsg('Gagal mengontrol Samba', 'error'));
        }

        function installSamba() {
            if (!confirm('Install Samba? Ini akan mengunduh dan menginstall paket samba.')) return;
            showMsg('Menginstall Samba... (mungkin butuh beberapa menit)', 'success');

            fetch('/api/smb/install', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        showMsg(data.error, 'error');
                    } else {
                        showMsg('Samba berhasil diinstall!', 'success');
                        loadStatus();
                    }
                })
                .catch(err => showMsg('Gagal menginstall Samba', 'error'));
        }
    </script>
</body>

</html>
