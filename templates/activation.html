<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Activation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f13;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 20%, rgba(94, 252, 232, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(115, 103, 240, 0.1) 0%, transparent 20%);
            z-index: -1;
        }

        .activation-card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .icon-lock {
            width: 80px;
            height: 80px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b6b;
            font-size: 2.5rem;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .hwid-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            position: relative;
        }

        .hwid-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .hwid-code {
            font-family: 'Consolas', monospace;
            font-size: 1.2rem;
            color: #55efc4;
            letter-spacing: 1px;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: #fff;
        }

        form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #55efc4;
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #55efc4, #00b894);
            border: none;
            border-radius: 8px;
            color: #1e1e28;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(85, 239, 196, 0.3);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="wallpaper"></div>

    <div class="activation-card">
        <div class="icon-lock"><i class="fa-solid fa-key"></i></div>
        <h1>Activation Required</h1>
        <p>This server is not activated. Please provide your Hardware ID to the administrator to receive a license key.
        </p>

        <div class="hwid-box">
            <div class="hwid-label">Your Hardware ID</div>
            <div class="hwid-code" id="hwid">{{ hwid }}</div>
            <button class="copy-btn" onclick="copyHWID()" title="Copy HWID"><i class="fa-regular fa-copy"></i></button>
        </div>

        {% if error %}
        <div class="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/activate">
            <div class="input-group">
                <input type="text" name="license_key" placeholder="Enter License Key" required autocomplete="off">
            </div>
            <button type="submit">Activate Server</button>
        </form>
    </div>

    <script>
        function copyHWID() {
            const hwid = document.getElementById('hwid').innerText;
            navigator.clipboard.writeText(hwid).then(() => {
                alert('HWID copied to clipboard!');
            });
        }
    </script>
</body>

</html>
