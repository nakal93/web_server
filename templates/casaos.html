<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaOS - Server Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f0f6fc;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.2rem;
            background: #161b22;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f6fc;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.primary {
            background: #238636;
            border-color: #238636;
        }

        .btn.primary:hover {
            background: #2ea043;
        }

        .btn.large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #161b22;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
        }

        .icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon i {
            font-size: 3rem;
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }

        .status-dot.offline {
            background: #f85149;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .info-box {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .info-box i {
            color: #58a6ff;
            margin-right: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="btn" onclick="window.location.href='/dashboard'"><i class="fa-solid fa-home"></i></button>
        <h2 style="font-weight:500; font-size:1rem"><i class="fa-solid fa-house-laptop" style="color:#00b4db"></i>
            CasaOS</h2>
    </div>

    <div class="content">
        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-house-laptop"></i>
            </div>
            <h1>CasaOS</h1>
            <p class="subtitle">Home Cloud Operating System</p>

            <div class="status" id="status">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Checking...</span>
            </div>

            <a href="#" class="btn primary large" id="open-btn" onclick="openCasaOS()">
                <i class="fa-solid fa-external-link"></i> Open CasaOS
            </a>

            <div class="info-box">
                <i class="fa-solid fa-shield-halved"></i>
                You are authenticated through the Dashboard. CasaOS will open in a new tab with direct access.
            </div>
        </div>
    </div>

    <script>
        // Check CasaOS status
        checkStatus();

        function checkStatus() {
            fetch('/api/casaos/status')
                .then(r => r.json())
                .then(data => {
                    const dot = document.getElementById('status-dot');
                    const text = document.getElementById('status-text');
                    const btn = document.getElementById('open-btn');

                    if (data.online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'Online';
                        text.style.color = '#3fb950';
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Offline';
                        text.style.color = '#f85149';
                        btn.style.opacity = '0.5';
                        btn.style.pointerEvents = 'none';
                    }
                })
                .catch(() => {
                    document.getElementById('status-dot').className = 'status-dot offline';
                    document.getElementById('status-text').textContent = 'Unknown';
                });
        }

        function openCasaOS() {
            // Request temporary access and open CasaOS
            fetch('/api/casaos/access', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        window.open(data.url, '_blank');
                    }
                });
        }
    </script>
</body>

</html>
